<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <!-- Boas práticas de segurança e privacidade (complementar cabeçalhos HTTP no servidor em produção) -->
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin">
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(), payment=()">
  <!-- CSP permissiva para Flutter Web + Google Fonts + gtag; endurecer no servidor se possível -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com https://fonts.googleapis.com https://fonts.gstatic.com https://www.gstatic.com; worker-src 'self' blob:; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests;">
  <meta name="theme-color" content="#00B4C8">
  <meta name="description" content="Software house especialista em Flutter, Java e SDKs para apps mobile, web e desktop com alta performance.">
  <meta name="keywords" content="Flutter, Java, SDK, PWA, SEO, Google Search Console, mobile, web, desktop">
  <meta name="robots" content="index, follow">
  <meta property="og:title" content="Codificando o Amanha, Hoje | PerfectGest">
  <meta property="og:description" content="Inovacao em Flutter, Java e SDKs com foco em codigo limpo, escala e performance.">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="pt_BR">
  <meta property="og:image" content="icons/Icon-512.png">
  <link rel="canonical" href="https://perfectpro-webpageoficial.onrender.com/">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="PerfectGest">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Codificando o Amanha, Hoje | PerfectGest</title>
  <link rel="manifest" href="manifest.json">
  <!-- Descobre o bootstrap mais cedo (não bloqueia parsing; ajuda o browser a planear a rede) -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <style>
    #pp-loading-shell {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f1418;
      color: #e8f7fa;
      z-index: 9999;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      transition: opacity 220ms ease;
    }
    #pp-loading-shell.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #pp-loading-shell .card {
      text-align: center;
      padding: 20px 24px;
      border: 1px solid rgba(0, 180, 200, 0.35);
      border-radius: 12px;
      background: rgba(17, 24, 29, 0.88);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
      max-width: 420px;
      width: calc(100% - 40px);
    }
    #pp-loading-shell .brand {
      margin: 0 0 8px;
      font-size: 20px;
      font-weight: 700;
      color: #00b4c8;
    }
    #pp-loading-shell .sub {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
      color: rgba(232, 247, 250, 0.84);
    }
  </style>
  <script>
    (function () {
      var path = (window.location && window.location.pathname ? window.location.pathname : '').toLowerCase();
      var standaloneLegalPaths = [
        '/politica-privacidade-perfectgest-i',
        '/politica-exclusao-dados-perfectgest-i',
      ];
      window.__ppSkipLoadingShell = standaloneLegalPaths.indexOf(path) >= 0;
    })();
  </script>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-N4BVXV4HBC"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-N4BVXV4HBC');
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <div id="pp-loading-shell" aria-live="polite">
    <div class="card">
      <p class="brand">PerfectGest</p>
      <p class="sub">Carregando experiência Web de alta performance...</p>
    </div>
  </div>
  <script>
    (function () {
      const shell = document.getElementById('pp-loading-shell');
      if (!shell) return;
      if (window.__ppSkipLoadingShell) {
        shell.remove();
        return;
      }
      const hide = () => {
        shell.classList.add('hidden');
        setTimeout(() => shell.remove(), 260);
      };
      window.addEventListener('flutter-first-frame', hide, { once: true });
      const observer = new MutationObserver(() => {
        if (document.querySelector('flt-glass-pane, flutter-view')) {
          hide();
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
      setTimeout(() => {
        observer.disconnect();
        hide();
      }, 7000);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
