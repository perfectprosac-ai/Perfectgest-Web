<!DOCTYPE html>

<head>
  <!--

  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://www.google-analytics.com https://analytics.google.com https://region1.google-analytics.com https://www.googletagmanager.com https://fonts.googleapis.com https://fonts.gstatic.com https://www.gstatic.com; worker-src 'self' blob:; base-uri 'self'; form-action 'self';">

  <!-- Descobre o bootstrap mais cedo (não bloqueia parsing; ajuda o browser a planear a rede) -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <!-- Consent Mode v2 (Google): default negado para anúncios; analytics conforme preferência em localStorage (pp_cookie_consent). Substituir G-XXXXXXXXXX pelo ID real. -->
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    (function () {
      var analytics = 'denied';
      try {
        if (localStorage.getItem('pp_cookie_consent') === 'granted') analytics = 'granted';
      } catch (e) {}
      gtag('consent', 'default', {
        'ad_storage': 'denied',
        'ad_user_data': 'denied',
        'ad_personalization': 'denied',
        'analytics_storage': analytics,
        'functionality_storage': 'granted',
        'personalization_storage': 'denied',
        'security_storage': 'granted',
        'wait_for_update': 500
      });
    })();
  </script>
  <!-- GA: só carrega o script externo se o utilizador já aceitou medição (localStorage), após load + idle — menos concorrência com Flutter e ~0 bytes se recusou. Após aceitar na barra, recarregar a página (como já indicado na app). -->
  <script>
    (function () {
      function analyticsGranted() {
        try {
          return localStorage.getItem('pp_cookie_consent') === 'granted';
        } catch (e) {
          return false;
        }
      }
      function injectGtag() {
        if (window.__ppGtagInjected) return;
        window.__ppGtagInjected = true;
        var s = document.createElement('script');
        s.async = true;
        s.src = 'https://www.googletagmanager.com/gtag/js?id=G-QDKSY8XJ96';
        s.onload = function () {
          try {
            gtag('js', new Date());
            gtag('config', 'G-QDKSY8XJ96', { anonymize_ip: true });
          } catch (e) {}
        };
        document.head.appendChild(s);
      }
      function scheduleInject() {
        if (!analyticsGranted()) return;
        var run = function () { injectGtag(); };
        if ('requestIdleCallback' in window) {
          requestIdleCallback(run, { timeout: 4000 });
        } else {
          setTimeout(run, 2000);
        }
      }
      window.addEventListener('load', scheduleInject);
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
